<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "tertiary": "#5f5e5e",
                  "surface-container": "#efeeea",
                  "inverse-surface": "#30312e",
                  "on-error": "#ffffff",
                  "tertiary-fixed-dim": "#c8c6c6",
                  "secondary": "#674bb5",
                  "on-primary": "#ffffff",
                  "surface-tint": "#775a19",
                  "on-tertiary-container": "#3b3b3b",
                  "secondary-container": "#ab8ffe",
                  "background": "#fbf9f5",
                  "surface-variant": "#e4e2de",
                  "on-background": "#1b1c1a",
                  "on-primary-fixed": "#261900",
                  "outline": "#7f7667",
                  "primary": "#775a19",
                  "on-error-container": "#93000a",
                  "surface-container-lowest": "#ffffff",
                  "primary-container": "#c5a059",
                  "on-primary-fixed-variant": "#5d4201",
                  "on-surface-variant": "#4e4639",
                  "on-surface": "#1b1c1a",
                  "on-primary-container": "#4e3700",
                  "secondary-fixed": "#e8ddff",
                  "primary-fixed": "#ffdea5",
                  "surface-container-high": "#eae8e4",
                  "surface-container-low": "#f5f3ef",
                  "surface-dim": "#dbdad6",
                  "surface-bright": "#fbf9f5",
                  "on-secondary-fixed": "#21005e",
                  "on-secondary-container": "#3f1e8c",
                  "on-secondary-fixed-variant": "#4f319c",
                  "on-tertiary-fixed": "#1b1c1c",
                  "tertiary-fixed": "#e4e2e1",
                  "tertiary-container": "#a7a5a5",
                  "on-tertiary": "#ffffff",
                  "primary-fixed-dim": "#e9c176",
                  "on-secondary": "#ffffff",
                  "error": "#ba1a1a",
                  "inverse-primary": "#e9c176",
                  "outline-variant": "#d1c5b4",
                  "surface-container-highest": "#e4e2de",
                  "inverse-on-surface": "#f2f0ed",
                  "error-container": "#ffdad6",
                  "on-tertiary-fixed-variant": "#474747",
                  "surface": "#fbf9f5",
                  "secondary-fixed-dim": "#cebdff"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "1rem",
                  "xl": "1.5rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Noto Serif"],
                  "body": ["Manrope"],
                  "label": ["Manrope"]
          }
        },
      },
    }
  </script>
<style>
    body {
      background-color: #fbf9f5;
      background-image: 
        radial-gradient(at 0% 0%, rgba(119, 90, 25, 0.03) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(103, 75, 181, 0.03) 0px, transparent 50%);
    }
    
    .grain-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .mandala-watermark {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      opacity: 0.03;
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body class="font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed min-h-screen flex items-center justify-center p-6 overflow-hidden">
<div class="grain-overlay"></div>
<!-- Subtle Mandala SVG Background -->
<svg class="mandala-watermark" viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
<path class="text-primary" d="M100 0 A100 100 0 0 1 200 100 A100 100 0 0 1 100 200 A100 100 0 0 1 0 100 A100 100 0 0 1 100 0 Z M100 20 A80 80 0 0 0 20 100 A80 80 0 0 0 100 180 A80 80 0 0 0 180 100 A80 80 0 0 0 100 20 Z" fill="currentColor" fill-rule="evenodd" opacity="0.5"></path>
<circle class="text-primary" cx="100" cy="100" fill="currentColor" r="10"></circle>
<path class="text-primary" d="M100 40 L105 55 L120 55 L110 65 L115 80 L100 70 L85 80 L90 65 L80 55 L95 55 Z" fill="currentColor" transform="rotate(0 100 100) translate(0 -40)"></path>
<path class="text-primary" d="M100 40 L105 55 L120 55 L110 65 L115 80 L100 70 L85 80 L90 65 L80 55 L95 55 Z" fill="currentColor" transform="rotate(45 100 100) translate(0 -40)"></path>
<path class="text-primary" d="M100 40 L105 55 L120 55 L110 65 L115 80 L100 70 L85 80 L90 65 L80 55 L95 55 Z" fill="currentColor" transform="rotate(90 100 100) translate(0 -40)"></path>
<path class="text-primary" d="M100 40 L105 55 L120 55 L110 65 L115 80 L100 70 L85 80 L90 65 L80 55 L95 55 Z" fill="currentColor" transform="rotate(135 100 100) translate(0 -40)"></path>
<path class="text-primary" d="M100 40 L105 55 L120 55 L110 65 L115 80 L100 70 L85 80 L90 65 L80 55 L95 55 Z" fill="currentColor" transform="rotate(180 100 100) translate(0 -40)"></path>
<path class="text-primary" d="M100 40 L105 55 L120 55 L110 65 L115 80 L100 70 L85 80 L90 65 L80 55 L95 55 Z" fill="currentColor" transform="rotate(225 100 100) translate(0 -40)"></path>
<path class="text-primary" d="M100 40 L105 55 L120 55 L110 65 L115 80 L100 70 L85 80 L90 65 L80 55 L95 55 Z" fill="currentColor" transform="rotate(270 100 100) translate(0 -40)"></path>
<path class="text-primary" d="M100 40 L105 55 L120 55 L110 65 L115 80 L100 70 L85 80 L90 65 L80 55 L95 55 Z" fill="currentColor" transform="rotate(315 100 100) translate(0 -40)"></path>
</svg>
<!-- Login Card Shell -->
<main class="w-full max-w-[440px] relative z-10">
<div class="bg-surface-container-lowest/80 backdrop-blur-xl rounded-xl p-8 md:p-12 shadow-[0_20px_40px_rgba(27,28,26,0.05)] border border-outline-variant/10">
<!-- Brand & Header -->
<header class="text-center mb-10">
<div class="inline-flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h1 class="font-headline text-3xl tracking-tight text-on-surface mb-2">Welcome Back</h1>
<p class="text-on-surface-variant font-body text-sm tracking-wide">Enter your celestial coordinates to continue</p>
</header>
<!-- Social Login -->
<div class="space-y-4 mb-10">
<button class="w-full flex items-center justify-center gap-3 py-3.5 px-4 bg-surface rounded-lg border border-outline-variant/20 hover:bg-surface-container-low transition-colors duration-300 group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body text-sm font-medium text-on-surface">Continue with Google</span>
</button>
</div>
<!-- Divider -->
<div class="relative flex items-center mb-10">
<div class="flex-grow border-t border-outline-variant/10"></div>
<span class="flex-shrink mx-4 text-[10px] uppercase tracking-widest text-on-surface-variant/40 font-bold">or use email</span>
<div class="flex-grow border-t border-outline-variant/10"></div>
</div>
<!-- Login Form -->
<form class="space-y-8">
<div class="relative group">
<input class="peer w-full bg-transparent border-b-2 border-outline-variant/20 py-2 font-body text-sm text-on-surface focus:outline-none focus:border-primary transition-colors placeholder-transparent" id="email" placeholder="Email Address" required="" type="email"/>
<label class="absolute left-0 -top-4 text-on-surface-variant text-[11px] font-bold tracking-widest uppercase transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:top-2 peer-placeholder-shown:font-normal peer-placeholder-shown:tracking-normal peer-placeholder-shown:text-on-surface/40 peer-focus:-top-4 peer-focus:text-[11px] peer-focus:font-bold peer-focus:text-primary peer-focus:tracking-widest" for="email">
            Email Address
          </label>
</div>
<div class="relative group">
<input class="peer w-full bg-transparent border-b-2 border-outline-variant/20 py-2 font-body text-sm text-on-surface focus:outline-none focus:border-primary transition-colors placeholder-transparent" id="password" placeholder="Password" required="" type="password"/>
<label class="absolute left-0 -top-4 text-on-surface-variant text-[11px] font-bold tracking-widest uppercase transition-all peer-placeholder-shown:text-sm peer-placeholder-shown:top-2 peer-placeholder-shown:font-normal peer-placeholder-shown:tracking-normal peer-placeholder-shown:text-on-surface/40 peer-focus:-top-4 peer-focus:text-[11px] peer-focus:font-bold peer-focus:text-primary peer-focus:tracking-widest" for="password">
            Password
          </label>
</div>
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer appearance-none w-4 h-4 rounded border border-outline-variant/40 checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-[12px] text-white opacity-0 peer-checked:opacity-100 left-0.5" data-icon="check">check</span>
</div>
<span class="text-xs text-on-surface-variant font-medium">Remember me</span>
</label>
<a class="text-xs text-secondary font-bold hover:text-on-secondary-container transition-colors" href="#">Forgot alignment?</a>
</div>
<button class="w-full bg-primary text-white py-4 rounded-lg font-body font-bold text-sm tracking-widest uppercase shadow-md shadow-primary/10 hover:bg-primary-container hover:text-on-primary-container transition-all duration-300 transform active:scale-[0.98]" type="submit">
          Sign In
        </button>
</form>
<!-- Footer CTA -->
<footer class="mt-12 text-center">
<p class="text-sm text-on-surface-variant">
          New to the cosmos? 
          <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 decoration-2 decoration-primary/30" href="#">Join the Circle</a>
</p>
</footer>
</div>
<!-- Decorative Bottom Detail -->
<div class="flex justify-center mt-12 gap-12 opacity-30 grayscale contrast-125">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="wb_sunny">wb_sunny</span>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="dark_mode">dark_mode</span>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="brightness_5">brightness_5</span>
</div>
</main>
<!-- Ambient Visuals -->
<div class="absolute top-10 left-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute bottom-10 right-10 w-96 h-96 bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>
</body></html>
